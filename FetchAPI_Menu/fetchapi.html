<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>Fetch API - CRUD Application</h2>
    <h3>Feltalálók tábla</h3>
    <!-- Alapból ne jelenjen meg semmi -->
    <div id="ResponsArea"></div>
    <form id="InputArea">
        <label for="Name">A feltaláló teljes neve*</label>
        <input id="Name" name="Name" type="text" ...>

        <label for="Born">A feltaláló születési éve*</label>
        <input id="Born" name="Born" type="number" ...>

        <label for="Died">A feltaláló halálozási éve</label>
        <input id="Died" name="Died" type="number" ...>

        <button id="SaveButton" type="submit">Save</button>
        <button id="ResetButton" type="reset">Clear</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Telejes név</th>
                <th>Születési dátum</th>
                <th>Halálozi dátum</th>
                <th>Műveletek</th>
            </tr>
        </thead>
        <!-- Ide jön majd a beolvasott adatok halmaza -->
        <tbody id="OutputArea"></tbody>
    </table>
</body>

</html>
<script src="FetchAPI.js"></script>
